『九十九《つくも》の庭』

　庭師は、夜明け前に庭へ出るのが常だった。
　黄花藤《きばなふじ》の花房がまだ露に濡れて、金の鎖のように静かに垂れている。

　剪定鋏《せんていばさみ》は腰に下げてある。百年《ももとせ》近く前の先祖から受け継いだ、大切な鋏。

　ある朝、その鋏がかすかに光を帯びた。

『あなたの手は、よくわたしを使ってくれた』

　声がした。
　庭師は、思わず刃を落としかけた。
　そこに立っていたのは、花の影から現れたひとつの影――鋏に宿った｜付喪神《つくもがみ》だった。

　†

　それからの日々、庭師と神は、四季を共にした。
　新芽を整える春、枝葉を透かす夏、落ち葉を掃く秋、雪を受け止める冬。

　時折、近所の子らが庭に遊び、わらべ唄や｜手毬遊《てまりあそ》びに興じた。

「おじちゃん、お庭であすんでいい？」

「いいとも。花や木を折ったりはしないようにな」

　庭師以外の者には神の姿は見えなかったが、神は、子供たちをやさしく見守っていた。

　神は庭師に問いを投げかけ、庭師は言葉を探しながら応じた。
　ときに噛み合わず、ときに笑い合い、互いの時間を紡いでいった。

　けれど、やがて庭師の髪には白が混じり、髷もほつれ、手は震えるようになった。

「なぜ、あなたは変わらないのかね」

　庭師が問うと、神は答えない。黄花藤の下、刃を閉じる澄んだ音だけが響く。

　庭に遊びにきた子らが、庭師のそばに立っていた。
　剪定鋏を手に、庭師は黄花藤の｜若枝《わかえだ》に目を凝らしていた。

「おじいちゃん、枝、切っちゃうの？　かあいそうよ」

　とりわけ幼い子どもが、遠慮がちに、小さな声で言った。
　庭師は手を止め、ほほえんで振り返った。

「そう思うよな。でもな、枝を少し減らすことで、木は風通しがよくなって、病気になりにくくなるんだよ」

「……そうなの？」

「木はな、ずっと大きくなるわけじゃない。だから、伸びすぎたところを整えてあげると、ずっと長く、元気でいられるんだ」

　子どもは、あわく納得したような顔で、うなずいた。

「きられるのかなしいけど、長生きしてほしいものねぇ」

　その言葉に、付喪神がそっと目を伏せた。
　切り落とされた若枝が、柔らかな音を立てて地に落ちた。

　†
    
　ある晩、二人は庭に立ち尽くしていた。
　月は低く、光は冷ややかに庭を照らしていた。

　庭師はふらつく体を支えるように、老いた手を鋏に置いた。

「いつか、わたしは此処にいなくなる。けれど、この庭をどうか見守ってほしい」

　神は黙したまま、ただ庭師と同じ方向を向いて月を仰いでいた。

　黄花藤は、やまぬ風に揺れていた。
　うつくしく、やさしく、しかし痛みを秘めた花として。

　それは｜友誼《ゆうぎ》の鎖であり、別れの鎖でもあった。

　月は、やはり応えなかった。
　けれども二つの影は並び立ち、同じ光を浴びていた。

　それだけで、九十九の庭は満ちていた。

　
〈了〉
